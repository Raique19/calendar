<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda Pro</title>

  <!-- FullCalendar -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/locales-all.global.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="topbar">
    Agenda Profissional
  </header>

  <div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <h3>Categorias</h3>
      <ul id="categoryList"></ul>

      <button id="todayBtn">Hoje</button>
      <button id="clearFilters">Limpar filtro</button>
    </aside>

    <!-- MAIN -->
    <main>
      <div id="calendar"></div>
    </main>

  </div>

  <!-- MODAL -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">

      <h2 id="modalTitle">Novo Evento</h2>

      <input id="title" placeholder="Título">

      <div class="row">
        <input type="time" id="start">
        <input type="time" id="end">
      </div>

      <select id="category"></select>

      <!-- PREVIEW -->
      <div class="preview">
        <span id="previewDot"></span>
        <span id="previewText">Pré-visualização</span>
      </div>

      <div class="actions">
        <button id="save">Salvar</button>
        <button id="delete" class="hidden">Excluir</button>
        <button id="close">Cancelar</button>
      </div>

    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
