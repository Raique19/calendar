<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda Profissional</title>

  <!-- FullCalendar -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/locales-all.global.min.js"></script>

  <link rel="stylesheet" href="style.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>

<body>

<header class="topbar">
  Agenda Profissional
</header>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h3>Categorias</h3>
    <ul id="categoryList"></ul>
<input id="search" placeholder="Buscar..." />
    <button id="todayBtn">Hoje</button>
    <button id="clearFilters">Limpar filtro</button>
  </aside>

  <!-- MAIN -->
  <main>
    <div id="calendar"></div>
  </main>

</div>

<!-- MODAL -->
<div id="modal" class="modal hidden">
  <div class="modal-content">

    <h2 id="modalTitle">Novo Evento</h2>

    <input id="title" placeholder="Título">

    <label>Tipo</label>
<select id="mode">
  <option value="presencial">Presencial</option>
  <option value="virtual">Virtual</option>
</select>

<label>Local</label>
<input id="location" placeholder="Ex: Sala 305">

<label>Link (se virtual)</label>
<input id="link" placeholder="https://...">

    <div class="row">
      <input type="time" id="start">
      <input type="time" id="end">
    </div>

    <select id="category"></select>

    <!-- PREVIEW -->
    <div class="preview">
      <span id="previewDot"></span>
      <span id="previewText">Pré-visualização</span>
    </div>

    <div class="actions">
      <button id="save">Salvar</button>
      <button id="delete" class="hidden">Excluir</button>
      <button id="close">Cancelar</button>
    </div>

  </div>
</div>

  <!-- MODAL DETALHES -->
<div id="detailsModal" class="modal hidden">
  <div class="modal-content details">

    <h2 id="detailTitle"></h2>

    <div class="detail-row">
      <i class="fa-solid fa-user"></i>
      <span id="detailMode"></span>
    </div>

    <div class="detail-row">
      <i class="fa-solid fa-location-dot"></i>
      <span id="detailLocation"></span>
    </div>

    <div class="detail-row">
      <i class="fa-solid fa-link"></i>
      <span id="detailLinkText"></span>
    </div>

    <a id="joinBtn" target="_blank" class="join hidden">
      <i class="fa-solid fa-video"></i>
      Entrar na reunião
    </a>

    <div class="actions">
      <button id="deleteEvent">
        <i class="fa-solid fa-trash"></i> Excluir
      </button>
      <button id="closeDetails">
        <i class="fa-solid fa-xmark"></i> Fechar
      </button>
    </div>

  </div>
</div>
  
<script type="module" src="script.js"></script>
</body>
</html>
